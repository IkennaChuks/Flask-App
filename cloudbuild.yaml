options:
  logging: CLOUD_LOGGING_ONLY


steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', '${_IMAGE_PATH}', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '${_IMAGE_PATH}']

- name: 'gcr.io/cloud-builders/gcloud'
  args: 
  - 'run'
  - 'deploy'
  - 'flask-app'   
  - '--image'
  - '${_IMAGE_PATH}'
  - '--region'  
  - 'us-central1' 
  - '--allow-unauthenticated'

substitutions:
  _REGION: 'us-central1'
  _IMAGE: devops/flask-app:latest
  _LOCATION : us-central1-docker.pkg.dev 
  _IMAGE_PATH : ${_LOCATION}/${PROJECT_ID}/${_IMAGE}  

images:
  - ${_LOCATION}/${PROJECT_ID}/${_IMAGE}

options:
  dynamicSubstitutions: true