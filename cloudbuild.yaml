options:
  logging: CLOUD_LOGGING_ONLY


steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', '${_LOCATION}/${PROJECT_ID}/${_IMAGE}', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '${_LOCATION}/${PROJECT_ID}/${_IMAGE}']

- name: 'gcr.io/cloud-builders/gcloud'
  args: 
  - 'run'
  - 'deploy'
  - 'flask-app'   
  - '--image'
  - '${_LOCATION}/${PROJECT_ID}/${_IMAGE}'
  - '--region'  
  - 'us-central1' 
  - '--allow-unauthenticated'

substitutions:
  _REGION: 'us-central1'
  _IMAGE: devops/flask-app:latest'
  _LOCATION : us-central1-docker.pkg.dev  

images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/${_IMAGE}' 