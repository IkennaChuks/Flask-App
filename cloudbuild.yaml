options:
  logging: CLOUD_LOGGING_ONLY


steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/dataeng-394602/devops/flask-app:latest', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/dataeng-394602/devops/flask-app:latest']

- name: 'gcr.io/cloud-builders/gcloud'
  args: 
  - 'run'
  - 'deploy'
  - 'flask-app'   
  - '--image'
  - 'us-central1-docker.pkg.dev/dataeng-394602/devops/flask-app:latest'
  - '--region'  
  - 'us-central1' 
  - '--allow-unauthenticated'